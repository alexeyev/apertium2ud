name: CI

on:
  push:
    branches: [main, ci]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # no submodules needed: ruff is configured to exclude external/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: ruff check
        run: ruff check .

  build-resources:
    name: Build resources (wiki + .udx submodules)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build-time dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Verify Apertium .udx submodule(s) are present
        run: |
          for lang in kir kaz uig; do
            test -f "external/apertium-$lang/apertium-$lang.$lang.udx" \
              || { echo "::error::apertium-$lang submodule .udx missing — was checkout submodules:recursive?"; exit 1; }
          done

      - name: Build resources (scrape wiki + copy/sanitize .udx)
        run: python build_resources.py

      - name: Sanity-check generated resources
        run: |
          test -f apertium2ud/resources/tags_map.json
          test -f apertium2ud/resources/custom.udx
          test -f apertium2ud/resources/kir.udx
          test -f apertium2ud/resources/kaz.udx
          test -f apertium2ud/resources/uig.udx
          python -c "import json; json.load(open('apertium2ud/resources/tags_map.json', encoding='utf-8'))"

      - name: Upload resources artifact
        uses: actions/upload-artifact@v4
        with:
          name: apertium2ud-resources
          path: |
            apertium2ud/resources/tags_map.json
            apertium2ud/resources/*.udx
          retention-days: 7

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: build-resources
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download pre-built resources
        uses: actions/download-artifact@v4
        with:
          name: apertium2ud-resources
          path: apertium2ud/resources

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest -q

  integration-eval:
    name: UD treebank evaluation (8 Turkic languages)
    needs: build-resources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download pre-built resources
        uses: actions/download-artifact@v4
        with:
          name: apertium2ud-resources
          path: apertium2ud/resources

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Evaluate against all available Turkic UD treebanks
        run: python tests/integration_ud_eval.py

  build-wheel:
    name: Build wheel & sdist (end-to-end, no pre-built resources)
    needs: build-resources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build frontend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify the wheel contains the resources
        run: |
          python - <<'PY'
          import glob, zipfile, sys
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          need = ["apertium2ud/resources/tags_map.json",
                  "apertium2ud/resources/custom.udx"]
          missing = [n for n in need if n not in names]
          if missing:
              print("::error::wheel missing resources:", missing); sys.exit(1)
          print("wheel OK:", whl)
          PY

      - name: Install the freshly built wheel into a clean env and smoke-test
        run: |
          python -m venv /tmp/v
          /tmp/v/bin/pip install --upgrade pip
          /tmp/v/bin/pip install dist/*.whl
          /tmp/v/bin/python - <<'PY'
          import logging; logging.disable(logging.WARNING)
          from apertium2ud.convert import a2ud
          upos, feats = a2ud(["n", "px3sp", "nom", "sg", "p3"])
          assert upos == ["NOUN"], upos
          assert not any("," in f for f in feats), feats
          print("clean-install smoke test passed:", upos, feats)
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: apertium2ud-dist
          path: dist/*
          retention-days: 7
